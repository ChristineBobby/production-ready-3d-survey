<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hunyuan3D GIF Render</title>
  <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 255, 255, 0.92) 0%, rgba(255, 255, 255, 0.18) 34%, transparent 60%),
        linear-gradient(180deg, #edf3ff 0%, #d9e6ff 54%, #d8f5fb 100%);
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: center;
      padding: 16px;
      box-sizing: border-box;
    }

    model-viewer {
      width: 766px;
      height: 244px;
      border-radius: 20px;
      background: transparent;
    }
  </style>
</head>
<body>
  <model-viewer
    id="render-viewer"
    src="static/models/Hunyuan3.glb"
    alt="Render source for Hunyuan3D 3.0 rotating GIF"
    environment-image="neutral"
    shadow-intensity="1"
    exposure="1.05"
    interaction-prompt="none"
    camera-controls
  ></model-viewer>
</body>
</html>
